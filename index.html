<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PARSEC — Browser Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    font-family: 'Courier New', Courier, monospace;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  /* ── Canvas wrapper ── */
  #wrap {
    position: relative;
    width: 100%;
    max-width: 800px;
    flex-shrink: 0;
  }
  canvas {
    display: block;
    width: 100%;
    /* height is set by JS to maintain 800:480 ratio */
    border: 2px solid #333;
    image-rendering: pixelated;
    touch-action: none;
  }

  /* ── Keyboard hint (hidden on touch) ── */
  #kb-hint {
    color: #555;
    font-size: 12px;
    margin-top: 6px;
    letter-spacing: 1px;
    text-align: center;
    flex-shrink: 0;
  }

  /* ── Mobile controls panel ── */
  #mobile-pad {
    display: none;
    width: 100%;
    max-width: 800px;
    padding: 6px 14px 4px;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    gap: 10px;
  }

  /* D-pad */
  #dpad {
    display: grid;
    grid-template-areas:
      ". up ."
      "lt ct rt"
      ". dn .";
    grid-template-columns: 56px 56px 56px;
    grid-template-rows: 56px 56px 56px;
    gap: 4px;
  }
  .db {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,200,0,0.35);
    border-radius: 10px;
    color: #FFD700;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
    transition: background 0.08s;
  }
  .db:active, .db.pressed { background: rgba(255,200,0,0.22); }
  #db-u { grid-area: up; }
  #db-l { grid-area: lt; }
  #db-c { grid-area: ct; background: transparent; border: none; }
  #db-r { grid-area: rt; }
  #db-d { grid-area: dn; }

  /* Center buttons (pause) */
  #center-btns {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  #btn-pause {
    width: 60px; height: 40px;
    background: rgba(255,255,255,0.07);
    border: 1px solid #444;
    border-radius: 8px;
    color: #999;
    font-size: 18px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #btn-pause:active { background: rgba(255,255,255,0.15); }

  /* Fire button */
  #btn-fire {
    width: 100px; height: 100px;
    background: rgba(255,40,40,0.15);
    border: 3px solid rgba(255,80,80,0.55);
    border-radius: 50%;
    color: #FF5555;
    font-size: 15px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
    transition: background 0.08s;
  }
  #btn-fire:active, #btn-fire.pressed {
    background: rgba(255,60,60,0.38);
    border-color: rgba(255,100,100,0.9);
  }

  /* Show on touch devices */
  @media (pointer: coarse) {
    #mobile-pad { display: flex; }
    #kb-hint    { display: none; }
  }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="c" width="800" height="480"></canvas>
</div>

<div id="kb-hint">ARROWS / WASD: Move &nbsp;|&nbsp; SPACE or Z: Fire &nbsp;|&nbsp; P: Pause</div>

<!-- Mobile controls -->
<div id="mobile-pad">
  <div id="dpad">
    <div class="db" id="db-u">▲</div>
    <div class="db" id="db-l">◄</div>
    <div id="db-c"></div>
    <div class="db" id="db-r">►</div>
    <div class="db" id="db-d">▼</div>
  </div>

  <div id="center-btns">
    <div id="btn-pause">⏸</div>
  </div>

  <div id="btn-fire">FIRE</div>
</div>

<script>
"use strict";
// ─────────────────────────────────────────────────────────────────────────────
// PARSEC – Browser Edition   (mobile-friendly version)
// Inspired by the classic TI-99/4A game by Texas Instruments (1982)
// ─────────────────────────────────────────────────────────────────────────────

const C   = document.getElementById('c');
const ctx = C.getContext('2d');
const W   = 800;
const H   = 480;
const HUD_H = 32;

// ─── Responsive canvas sizing ─────────────────────────────────────────────────
function fitCanvas() {
  const wrap = document.getElementById('wrap');
  const pad  = document.getElementById('mobile-pad');
  const isTouch = window.matchMedia('(pointer: coarse)').matches;

  if (isTouch) {
    // Available height minus controls panel
    const padH   = pad.offsetHeight || 0;
    const avail  = window.innerHeight - padH - 4;
    const byW    = window.innerWidth;
    const byH    = avail * (800 / 480);
    const cssW   = Math.min(byW, byH);
    C.style.width  = cssW + 'px';
    C.style.height = (cssW * 480 / 800) + 'px';
    wrap.style.width = cssW + 'px';
  } else {
    // Desktop: constrain to 800px max, natural viewport height
    const maxW = Math.min(window.innerWidth, 800);
    C.style.width  = maxW + 'px';
    C.style.height = (maxW * 480 / 800) + 'px';
    wrap.style.width = maxW + 'px';
  }
  body_flex_justify();
}
function body_flex_justify() {
  const isTouch = window.matchMedia('(pointer: coarse)').matches;
  document.body.style.justifyContent = isTouch ? 'flex-start' : 'center';
}

window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(fitCanvas, 200));
// Initial fit after mobile-pad renders
setTimeout(fitCanvas, 0);

// ─── Audio Engine ─────────────────────────────────────────────────────────────
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}
function tone(freq, type, dur, vol = 0.25, freqStart = null) {
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type;
    const t = ac.currentTime;
    o.frequency.setValueAtTime(freqStart || freq, t);
    if (freqStart) o.frequency.exponentialRampToValueAtTime(freq, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function noise(dur, vol = 0.4) {
  try {
    const ac = getAC();
    const len = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ac.createBufferSource();
    const g = ac.createGain();
    src.buffer = buf; src.connect(g); g.connect(ac.destination);
    g.gain.value = vol; src.start();
  } catch(e) {}
}
function sfxShoot()    { tone(900, 'square', 0.07, 0.12, 1400); }
function sfxExplosion(big) { noise(big ? 0.5 : 0.25, big ? 0.5 : 0.3); tone(80, 'sawtooth', 0.3, 0.15, 200); }
function sfxHit()      { tone(220, 'sawtooth', 0.12, 0.18, 440); }
function sfxRefuel()   { if (Math.random() < 0.25) tone(523 + Math.random() * 200, 'sine', 0.04, 0.08); }
function sfxLevelUp()  {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 'square', 0.12, 0.18), i * 110));
}
function sfxGameOver() { tone(220, 'sawtooth', 0.6, 0.3, 440); }

// ─── Keyboard Input ───────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyP') {
    if (gs && gs.state === 'play')  gs.state = 'pause';
    else if (gs && gs.state === 'pause') gs.state = 'play';
  }
  if (['Enter','Space','KeyZ'].includes(e.code)) {
    if (!gs || gs.state === 'title' || gs.state === 'over') {
      getAC().resume().then(startGame);
    }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Mobile / Touch Input ─────────────────────────────────────────────────────
// Virtual joystick state (for canvas-direct touch on the game area)
const joy = { active: false, id: -1, cx: 0, cy: 0, dx: 0, dy: 0 };
const fireT = { active: false, id: -1 };

// Helper: screen coords → canvas game coords
function screenToCanvas(clientX, clientY) {
  const r  = C.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top)  * (H / r.height),
  };
}

// Canvas touch — title/gameover tap-to-start + in-game virtual joystick + right-side fire
C.addEventListener('touchstart', e => {
  e.preventDefault();
  getAC().resume();
  if (!gs || gs.state === 'title' || gs.state === 'over') { startGame(); return; }
  if (gs.state === 'pause') { gs.state = 'play'; return; }

  for (const t of e.changedTouches) {
    const gc = screenToCanvas(t.clientX, t.clientY);
    if (gc.x < W * 0.55 && !joy.active) {
      // Left area: joystick
      Object.assign(joy, { active: true, id: t.identifier, cx: t.clientX, cy: t.clientY, dx: 0, dy: 0 });
    } else if (gc.x >= W * 0.55 && !fireT.active) {
      // Right area: fire
      Object.assign(fireT, { active: true, id: t.identifier });
      keys['Space'] = true;
    }
  }
}, { passive: false });

C.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      joy.dx = t.clientX - joy.cx;
      joy.dy = t.clientY - joy.cy;
    }
  }
}, { passive: false });

C.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      joy.active = false; joy.id = -1; joy.dx = 0; joy.dy = 0;
      keys['ArrowUp'] = keys['ArrowDown'] = keys['ArrowLeft'] = keys['ArrowRight'] = false;
    }
    if (t.identifier === fireT.id) {
      fireT.active = false; fireT.id = -1;
      keys['Space'] = false;
    }
  }
}, { passive: false });

C.addEventListener('touchcancel', e => {
  joy.active = false; joy.id = -1; joy.dx = 0; joy.dy = 0;
  fireT.active = false; fireT.id = -1;
  keys['ArrowUp'] = keys['ArrowDown'] = keys['ArrowLeft'] = keys['ArrowRight'] = keys['Space'] = false;
}, { passive: false });

// ── D-pad HTML buttons ──
function setupDpadBtn(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  const down = e => { e.preventDefault(); keys[code] = true;  el.classList.add('pressed'); };
  const up   = e => { e.preventDefault(); keys[code] = false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  down, { passive: false });
  el.addEventListener('touchend',    up,   { passive: false });
  el.addEventListener('touchcancel', up,   { passive: false });
}
setupDpadBtn('db-u', 'ArrowUp');
setupDpadBtn('db-d', 'ArrowDown');
setupDpadBtn('db-l', 'ArrowLeft');
setupDpadBtn('db-r', 'ArrowRight');

// ── Fire HTML button ──
(function() {
  const el = document.getElementById('btn-fire');
  if (!el) return;
  const down = e => { e.preventDefault(); keys['Space'] = true;  el.classList.add('pressed'); getAC().resume(); };
  const up   = e => { e.preventDefault(); keys['Space'] = false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  down, { passive: false });
  el.addEventListener('touchend',    up,   { passive: false });
  el.addEventListener('touchcancel', up,   { passive: false });
  // Also start game on fire tap
  el.addEventListener('touchstart', e => {
    if (!gs || gs.state === 'title' || gs.state === 'over') { e.preventDefault(); startGame(); }
  }, { passive: false });
})();

// ── Pause HTML button ──
(function() {
  const el = document.getElementById('btn-pause');
  if (!el) return;
  el.addEventListener('touchstart', e => {
    e.preventDefault(); getAC().resume();
    if (gs && gs.state === 'play')  gs.state = 'pause';
    else if (gs && gs.state === 'pause') gs.state = 'play';
  }, { passive: false });
})();

// ─── Helpers ──────────────────────────────────────────────────────────────────
const clamp  = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp   = (a, b, t)   => a + (b - a) * t;
const rnd    = (lo, hi)    => lo + Math.random() * (hi - lo);
const rndInt = (lo, hi)    => Math.floor(rnd(lo, hi + 1));
const rectHit = (a, b) =>
  a.x < b.x + b.w && a.x + a.w > b.x &&
  a.y < b.y + b.h && a.y + a.h > b.y;

// ─── Stars ────────────────────────────────────────────────────────────────────
const STAR_LAYERS = [
  { stars: [], speed: 0.3, sz: 0.8 },
  { stars: [], speed: 0.7, sz: 1.2 },
  { stars: [], speed: 1.4, sz: 1.8 },
];
(function initStars() {
  STAR_LAYERS.forEach(layer => {
    for (let i = 0; i < 60; i++)
      layer.stars.push({ x: Math.random() * W, y: Math.random() * (H - HUD_H) });
  });
})();
function updateStars() {
  STAR_LAYERS.forEach(layer => {
    layer.stars.forEach(s => {
      s.x -= layer.speed;
      if (s.x < 0) { s.x = W; s.y = Math.random() * (H - HUD_H); }
    });
  });
}
function drawStars() {
  STAR_LAYERS.forEach((layer, li) => {
    ctx.fillStyle = `rgba(255,255,255,${0.4 + li * 0.2})`;
    layer.stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, layer.sz, 0, Math.PI * 2);
      ctx.fill();
    });
  });
}

// ─── Terrain ─────────────────────────────────────────────────────────────────
const SEG_W = 14;
const SEGS  = Math.ceil(W / SEG_W) + 6;
let tPts = [];
let inFuelZone = false, fuelZoneLeft = 0, fuelZoneCd = 0;

function initTerrain() {
  tPts = []; inFuelZone = false; fuelZoneLeft = 0; fuelZoneCd = 220;
  let y = H - 100;
  for (let i = 0; i < SEGS + 4; i++) {
    tPts.push({ x: i * SEG_W, y, fuel: false });
    y = clamp(y + rnd(-22, 22), H - 210, H - 48);
  }
}
function terrainYAt(px) {
  for (let i = 0; i < tPts.length - 1; i++) {
    if (tPts[i].x <= px && tPts[i+1].x > px) {
      const t = (px - tPts[i].x) / (tPts[i+1].x - tPts[i].x);
      return lerp(tPts[i].y, tPts[i+1].y, t);
    }
  }
  return H - 60;
}
function playerOverFuelZone() {
  const p = gs.player, mid = p.x + p.w / 2;
  for (let i = 0; i < tPts.length - 1; i++)
    if (tPts[i].x <= mid && tPts[i+1].x > mid) return tPts[i].fuel;
  return false;
}
function advanceTerrain(spd) {
  for (const pt of tPts) pt.x -= spd;
  while (tPts.length && tPts[0].x < -SEG_W * 2) tPts.shift();
  while (tPts.length < SEGS + 4) {
    const prev = tPts[tPts.length - 1];
    fuelZoneCd--;
    let fuel = false;
    if (fuelZoneCd <= 0 && !inFuelZone) {
      inFuelZone = true; fuelZoneLeft = 16;
      fuelZoneCd = 320 + rndInt(0, 200);
      addMsg('FUEL STATION AHEAD!', W/2 - 10, H/2 - 60, '#00FFFF');
    }
    let newY;
    if (inFuelZone && fuelZoneLeft > 0) {
      fuel = true; newY = H - 68;
      if (--fuelZoneLeft === 0) inFuelZone = false;
    } else {
      newY = clamp(prev.y + rnd(-22, 22), H - 210, H - 48);
    }
    tPts.push({ x: prev.x + SEG_W, y: newY, fuel });
  }
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnExplosion(x, y, big) {
  const n = big ? 36 : 16;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = rnd(0.5, big ? 4.5 : 2.5);
    gs.particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: rndInt(18, big ? 55 : 38),
      col: ['#FFD700','#FF8C00','#FF4500','#FFFFFF','#FF6644'][rndInt(0,4)],
      sz: rnd(1.5, big ? 5 : 3.5),
    });
  }
}

// ─── Messages ─────────────────────────────────────────────────────────────────
function addMsg(text, x, y, col = '#FFD700') {
  gs.msgs.push({ text, x, y, life: 90, col });
}

// ─── Ship Drawing ─────────────────────────────────────────────────────────────
function drawPlayerShip(x, y, w, h, col) {
  ctx.save(); ctx.translate(x + w*.5, y + h*.5);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo( w*.5, 0); ctx.lineTo(-w*.3,-h*.35); ctx.lineTo(-w*.5, 0); ctx.lineTo(-w*.3, h*.35);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#3399FF';
  ctx.beginPath();
  ctx.moveTo(w*.05,0); ctx.lineTo(-w*.3,-h*.35); ctx.lineTo(-w*.1,-h*.75); ctx.lineTo(w*.1,-h*.2);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w*.05,0); ctx.lineTo(-w*.3, h*.35); ctx.lineTo(-w*.1, h*.75); ctx.lineTo(w*.1, h*.2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#00FFFF';
  ctx.beginPath(); ctx.arc(w*.15, 0, h*.22, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FF6600';
  ctx.beginPath(); ctx.arc(-w*.45, 0, h*.12, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawFighter(x, y, w, h, col) {
  ctx.save(); ctx.translate(x+w*.5, y+h*.5); ctx.scale(-1,1);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(w*.5,0); ctx.lineTo(-w*.3,-h*.35); ctx.lineTo(-w*.5,0); ctx.lineTo(-w*.3,h*.35);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF4400';
  ctx.beginPath();
  ctx.moveTo(w*.05,0); ctx.lineTo(-w*.3,-h*.35); ctx.lineTo(-w*.1,-h*.7); ctx.lineTo(w*.1,-h*.18);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w*.05,0); ctx.lineTo(-w*.3, h*.35); ctx.lineTo(-w*.1, h*.7); ctx.lineTo(w*.1, h*.18);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF8800';
  ctx.beginPath(); ctx.arc(w*.15, 0, h*.22, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawSwooper(x, y, w, h) {
  ctx.save(); ctx.translate(x+w*.5, y+h*.5);
  ctx.fillStyle = '#44FF66';
  ctx.beginPath(); ctx.ellipse(0, 0, w*.22, h*.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#22CC44';
  ctx.beginPath(); ctx.moveTo(-w*.05,-h*.1); ctx.lineTo(-w*.5,-h*.7); ctx.lineTo(-w*.18,h*.2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo( w*.05,-h*.1); ctx.lineTo( w*.5,-h*.7); ctx.lineTo( w*.18,h*.2); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#44FF66';
  ctx.beginPath(); ctx.moveTo(-w*.1,h*.25); ctx.lineTo(w*.1,h*.25); ctx.lineTo(0,h*.6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF0000';
  ctx.beginPath(); ctx.arc(0, -h*.05, h*.1, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawBomber(x, y, w, h, hp) {
  ctx.save(); ctx.translate(x+w*.5, y+h*.5); ctx.scale(-1,1);
  ctx.fillStyle = '#CC3300';
  ctx.beginPath();
  ctx.moveTo(w*.5,0); ctx.lineTo(-w*.1,-h*.45); ctx.lineTo(-w*.5,-h*.3); ctx.lineTo(-w*.5,h*.3); ctx.lineTo(-w*.1,h*.45);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#882200';
  ctx.beginPath(); ctx.moveTo(-w*.1,-h*.45); ctx.lineTo(w*.0,-h*.9); ctx.lineTo(w*.2,-h*.45); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-w*.1, h*.45); ctx.lineTo(w*.0, h*.9); ctx.lineTo(w*.2, h*.45); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF6600';
  ctx.beginPath(); ctx.arc(w*.3, 0, h*.3, 0, Math.PI*2); ctx.fill();
  if (hp > 1) {
    ctx.fillStyle = '#550000'; ctx.fillRect(-w*.5,-h*.5-8,w,6);
    ctx.fillStyle = '#FF0000'; ctx.fillRect(-w*.5,-h*.5-8,w*(hp/3),6);
  }
  ctx.restore();
}
function drawTurret(x, y, w, h, angle) {
  ctx.save(); ctx.translate(x+w*.5, y+h*.5);
  ctx.fillStyle = '#886600'; ctx.fillRect(-w*.5, 0, w, h*.5);
  ctx.fillStyle = '#AAAA00';
  ctx.beginPath(); ctx.arc(0, 0, h*.42, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#FFEE00'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(angle)*h*.55, Math.sin(angle)*h*.55); ctx.stroke();
  ctx.restore();
}

// ─── Spawners ─────────────────────────────────────────────────────────────────
function spawnEnemy() {
  const lv = gs.level, roll = Math.random();
  const fPct = roll < 0.45 ? 0 : roll < 0.72 ? 1 : roll < 0.87 ? 2 : 3;
  const types = ['fighter','swooper','bomber','turret'];
  let type = types[fPct];
  if (type === 'bomber' && lv < 2) type = 'fighter';
  if (type === 'turret' && lv < 3) type = 'fighter';
  const base = { active: true, type };
  switch (type) {
    case 'fighter': return { ...base,
      x: W+20, y: rnd(50, H-HUD_H-220), w: 34, h: 16,
      vx: -(gs.scrollSpd+1.2+lv*.18), vy: 0, hp: 1, pts: 100,
      phase: 0, amp: rnd(0,40), freq: rnd(.025,.055), shootCd: rndInt(80,140) };
    case 'swooper': return { ...base,
      x: W+20, y: rnd(30,120), w: 32, h: 24,
      vx: -(gs.scrollSpd+2.2), vy: 0, hp: 1, pts: 180,
      t: 0, baseY: rnd(30,120), amp: rnd(70,130), shootCd: rndInt(100,180) };
    case 'bomber': return { ...base,
      x: W+20, y: rnd(70, H-HUD_H-240), w: 52, h: 26,
      vx: -(gs.scrollSpd*.65), vy: 0, hp: 3, pts: 400, shootCd: rndInt(35,60) };
    case 'turret': return { ...base,
      x: W+20, y: 0, w: 28, h: 22, vx: -gs.scrollSpd, vy: 0,
      hp: 2, pts: 250, angle: -Math.PI*.75, targetAngle: -Math.PI*.75, shootCd: rndInt(60,90), grounded: true };
  }
}

// ─── Game State ───────────────────────────────────────────────────────────────
let gs = null;
function startGame() {
  gs = {
    state: 'play', score: 0, hiScore: (gs && gs.hiScore) || 0,
    lives: 3, level: 1, fuel: 100, maxFuel: 100,
    fuelDrain: 0.018, scrollSpd: 2.5, levelProg: 0, levelLen: 2400,
    enemyTimer: 0, enemyInterval: 110, refueling: false,
    player: { x: 110, y: H/2-20, vx: 0, vy: 0, w: 38, h: 18, shootCd: 0, invincible: 0 },
    bullets: [], eBullets: [], enemies: [], particles: [], msgs: [],
  };
  initTerrain();
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  if (!gs || gs.state !== 'play') return;
  const p = gs.player;

  // Apply joystick state to keys (overrides if joystick active)
  if (joy.active) {
    const dz = 12; // deadzone in screen pixels
    keys['ArrowLeft']  = joy.dx < -dz;
    keys['ArrowRight'] = joy.dx >  dz;
    keys['ArrowUp']    = joy.dy < -dz;
    keys['ArrowDown']  = joy.dy >  dz;
  }

  const spd = 4.8;
  if (keys['ArrowLeft']  || keys['KeyA']) p.vx = -spd;
  else if (keys['ArrowRight'] || keys['KeyD']) p.vx =  spd;
  else p.vx *= 0.78;
  if (keys['ArrowUp']   || keys['KeyW']) p.vy = -spd;
  else if (keys['ArrowDown']  || keys['KeyS']) p.vy =  spd;
  else p.vy *= 0.78;

  p.x = clamp(p.x + p.vx, 8, W*.58 - p.w);
  p.y = clamp(p.y + p.vy, 8, H - HUD_H - p.h - 2);

  const terrY = terrainYAt(p.x + p.w*.5);
  if (p.y + p.h >= terrY - 1) {
    if (playerOverFuelZone()) {
      gs.refueling = true;
      if (gs.fuel < gs.maxFuel) {
        gs.fuel = Math.min(gs.maxFuel, gs.fuel + 1.1);
        sfxRefuel();
        if (gs.fuel >= gs.maxFuel) addMsg('TANK FULL!', p.x+20, p.y-20, '#00FF00');
      }
      p.y = terrY - p.h - 1;
    } else if (!p.invincible) { killPlayer(); return; }
  } else { gs.refueling = false; }

  gs.fuel -= gs.fuelDrain;
  if (gs.fuel <= 0) { gs.fuel = 0; killPlayer(); return; }
  if (gs.fuel < 20 && Math.floor(Date.now()/500)%2===0 && !gs._fuelWarn) {
    gs._fuelWarn = true;
    addMsg('LOW FUEL!', p.x, p.y - 24, '#FF4400');
  }
  if (gs.fuel >= 20) gs._fuelWarn = false;

  if (p.invincible > 0) p.invincible--;
  if (p.shootCd > 0) p.shootCd--;
  if ((keys['Space'] || keys['KeyZ']) && p.shootCd === 0) {
    gs.bullets.push({ x: p.x+p.w, y: p.y+p.h/2-2, w: 14, h: 5, vx: 11, vy: 0 });
    p.shootCd = 11;
    sfxShoot();
  }

  advanceTerrain(gs.scrollSpd);
  gs.bullets  = gs.bullets.filter(b => { b.x += b.vx; return b.x < W+20; });
  gs.eBullets = gs.eBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H;
  });

  gs.enemyTimer++;
  if (gs.enemyTimer >= gs.enemyInterval) {
    gs.enemyTimer = 0;
    const e = spawnEnemy();
    if (e.type === 'turret') e.y = terrainYAt(e.x) - e.h;
    if (Math.random() < 0.25 && e.type === 'fighter') {
      const n = rndInt(2,3);
      for (let i = 0; i < n; i++) {
        const fe = spawnEnemy(); fe.type = 'fighter';
        fe.x = W+20+i*55; fe.y = rnd(50, H-HUD_H-220);
        gs.enemies.push(fe);
      }
    } else { gs.enemies.push(e); }
    gs.enemyInterval = Math.max(38, 110 - gs.level*7);
  }

  for (const e of gs.enemies) {
    if (!e.active) continue;
    e.x += e.vx;
    if (e.type === 'fighter') { e.phase += e.freq; e.y += Math.sin(e.phase)*e.amp*.012; e.y = clamp(e.y, 30, H-HUD_H-200); }
    else if (e.type === 'swooper') { e.t += .055; e.y = e.baseY + Math.sin(e.t)*e.amp; e.y = clamp(e.y, 20, H-HUD_H-180); }
    else if (e.type === 'turret') { e.y = terrainYAt(e.x+e.w*.5)-e.h; e.targetAngle = Math.atan2(p.y-e.y, p.x-e.x); e.angle = lerp(e.angle, e.targetAngle, .04); }
    e.shootCd--;
    if (e.shootCd <= 0) {
      e.shootCd = rndInt(50,100);
      const dx = p.x-e.x, dy = p.y-e.y, d = Math.hypot(dx,dy);
      if (d < 500 && e.type !== 'turret') {
        const spd2 = 3.5 + gs.level*.15;
        gs.eBullets.push({ x:e.x, y:e.y+e.h*.5, w:9, h:4, vx:-spd2*.8+(dx/d)*spd2*.4, vy:(dy/d)*spd2*.55 });
      }
      if (e.type === 'turret') {
        const spd2 = 4.5, a = e.angle;
        gs.eBullets.push({ x:e.x+e.w*.5+Math.cos(a)*e.h*.55, y:e.y+e.h*.5+Math.sin(a)*e.h*.55, w:9, h:4, vx:Math.cos(a)*spd2, vy:Math.sin(a)*spd2 });
      }
    }
    if (e.x + e.w < -40) { e.active = false; continue; }
    for (const b of gs.bullets) {
      if (b.vx > 0 && rectHit(b, e)) {
        b.x = -9999; e.hp--;
        if (e.hp <= 0) {
          e.active = false;
          spawnExplosion(e.x+e.w*.5, e.y+e.h*.5, e.type==='bomber');
          sfxExplosion(e.type==='bomber');
          gs.score += e.pts;
          addMsg('+'+e.pts, e.x+e.w*.5, e.y-8);
        } else sfxHit();
        break;
      }
    }
    if (!e.active) continue;
    if (!p.invincible && rectHit(p, e)) { killPlayer(); return; }
  }
  gs.enemies = gs.enemies.filter(e => e.active);

  if (!p.invincible) {
    for (const b of gs.eBullets) {
      if (rectHit(p, b)) { b.x = -9999; killPlayer(); return; }
    }
  }

  for (const pt of gs.particles) { pt.x += pt.vx; pt.y += pt.vy; pt.vy += .06; pt.life--; }
  gs.particles = gs.particles.filter(pt => pt.life > 0);
  for (const m of gs.msgs) { m.y -= .5; m.life--; }
  gs.msgs = gs.msgs.filter(m => m.life > 0);
  updateStars();

  gs.levelProg += gs.scrollSpd;
  if (gs.levelProg >= gs.levelLen) {
    gs.levelProg = 0; gs.level++;
    gs.scrollSpd = Math.min(6.5, 2.5 + gs.level*.28);
    gs.fuelDrain = Math.min(.055, .018 + gs.level*.004);
    sfxLevelUp();
    addMsg('LEVEL ' + gs.level, W/2, H/2-30, '#FFD700');
  }
}

function killPlayer() {
  const p = gs.player;
  spawnExplosion(p.x+p.w*.5, p.y+p.h*.5, true); sfxExplosion(true);
  gs.lives--;
  if (gs.lives <= 0) { gs.hiScore = Math.max(gs.hiScore, gs.score); gs.state = 'over'; sfxGameOver(); return; }
  p.x = 110; p.y = H/2-20; p.vx = 0; p.vy = 0; p.invincible = 200;
  gs.fuel = gs.maxFuel; gs.eBullets = [];
  addMsg('SHIP LOST!', W/2, H/2-20, '#FF4444');
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#00000E'; ctx.fillRect(0, 0, W, H-HUD_H);
  ctx.fillStyle = '#0A0A0A'; ctx.fillRect(0, H-HUD_H, W, HUD_H);
  drawStars();

  if (!gs || gs.state === 'title') { drawTitle(); return; }

  // Terrain
  if (tPts.length > 1) {
    ctx.beginPath(); ctx.moveTo(0, H-HUD_H);
    ctx.lineTo(tPts[0].x, tPts[0].y);
    for (let i = 1; i < tPts.length; i++) ctx.lineTo(tPts[i].x, tPts[i].y);
    ctx.lineTo(W, H-HUD_H); ctx.closePath();
    const grd = ctx.createLinearGradient(0, H-240, 0, H-HUD_H);
    grd.addColorStop(0,'#CC9900'); grd.addColorStop(.4,'#AA7700'); grd.addColorStop(1,'#774400');
    ctx.fillStyle = grd; ctx.fill();
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(tPts[0].x, tPts[0].y);
    for (let i = 1; i < tPts.length; i++) ctx.lineTo(tPts[i].x, tPts[i].y);
    ctx.stroke();
    // Fuel zone labels
    let inFZ = false, fzStart = 0;
    for (let i = 0; i < tPts.length; i++) {
      if (tPts[i].fuel && !inFZ) { inFZ = true; fzStart = tPts[i].x; }
      if (!tPts[i].fuel && inFZ) {
        inFZ = false;
        const midX = (fzStart + tPts[i].x)*.5, ty = terrainYAt(midX);
        ctx.save(); ctx.fillStyle='#00FFFF'; ctx.shadowColor='#00FFFF'; ctx.shadowBlur=6;
        ctx.font='bold 11px Courier New'; ctx.textAlign='center';
        ctx.fillText('◆ FUEL ◆', midX, ty-8); ctx.restore();
        ctx.fillStyle='rgba(0,200,200,0.08)';
        ctx.fillRect(fzStart, ty-4, tPts[i].x-fzStart, H-HUD_H-ty+4);
      }
    }
  }

  // Enemies
  for (const e of gs.enemies) {
    if (!e.active) continue;
    if      (e.type==='fighter') drawFighter(e.x, e.y, e.w, e.h, '#FF5533');
    else if (e.type==='swooper') drawSwooper(e.x, e.y, e.w, e.h);
    else if (e.type==='bomber')  drawBomber(e.x, e.y, e.w, e.h, e.hp);
    else if (e.type==='turret')  drawTurret(e.x, e.y, e.w, e.h, e.angle);
  }

  // Player
  const p = gs.player;
  const blink = p.invincible > 0 && Math.floor(p.invincible/6)%2===0;
  if (!blink) {
    drawPlayerShip(p.x, p.y, p.w, p.h, '#5599FF');
    const fl = rnd(6,14);
    const fg = ctx.createLinearGradient(p.x-2,p.y+p.h*.5,p.x-2-fl,p.y+p.h*.5);
    fg.addColorStop(0,'#FF8800'); fg.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(p.x-4,p.y+p.h*.5,fl,4,0,0,Math.PI*2); ctx.fill();
  }
  if (gs.refueling) {
    ctx.save(); ctx.fillStyle='#00FF88'; ctx.font='bold 11px Courier New';
    ctx.textAlign='center'; ctx.fillText('REFUELING', p.x+p.w*.5, p.y-8); ctx.restore();
  }

  // Player bullets
  for (const b of gs.bullets) {
    const gr = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,5);
    gr.addColorStop(0,'#FFFFFF'); gr.addColorStop(.4,'#FFE000'); gr.addColorStop(1,'rgba(255,180,0,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.ellipse(b.x,b.y+b.h*.5,6,3,0,0,Math.PI*2); ctx.fill();
  }
  // Enemy bullets
  for (const b of gs.eBullets) {
    const gr = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,5);
    gr.addColorStop(0,'#FFFFFF'); gr.addColorStop(.4,'#FF6600'); gr.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.ellipse(b.x,b.y+b.h*.5,5,3,.3,0,Math.PI*2); ctx.fill();
  }

  // Particles
  for (const pt of gs.particles) {
    ctx.globalAlpha = clamp(pt.life/30, 0, 1);
    ctx.fillStyle = pt.col;
    ctx.fillRect(pt.x-pt.sz*.5, pt.y-pt.sz*.5, pt.sz, pt.sz);
  }
  ctx.globalAlpha = 1;

  // Messages
  for (const m of gs.msgs) {
    ctx.save(); ctx.globalAlpha = clamp(m.life/40,0,1);
    ctx.fillStyle=m.col; ctx.shadowColor=m.col; ctx.shadowBlur=10;
    ctx.font='bold 15px Courier New'; ctx.textAlign='center';
    ctx.fillText(m.text, m.x, m.y); ctx.restore();
  }

  drawHUD();

  // ── On-canvas virtual controls hint (touch devices, during play) ──
  const isTouch = window.matchMedia('(pointer: coarse)').matches;
  if (isTouch && gs.state === 'play') {
    // Left: joystick visualiser
    if (joy.active) {
      const r = C.getBoundingClientRect();
      const sx = W / r.width, sy = H / r.height;
      const cx = (joy.cx - r.left) * sx;
      const cy = (joy.cy - r.top)  * sy;
      const dx = clamp(joy.dx * sx, -44, 44);
      const dy = clamp(joy.dy * sy, -44, 44);
      ctx.save(); ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, 44, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = 'rgba(255,215,0,0.55)';
      ctx.beginPath(); ctx.arc(cx+dx, cy+dy, 18, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    // Right: fire zone hint
    ctx.save(); ctx.globalAlpha = 0.12;
    ctx.fillStyle = keys['Space'] ? '#FF4444' : '#553333';
    ctx.beginPath(); ctx.roundRect(W*.58, H-HUD_H-100, W*.42-4, 92, 12); ctx.fill();
    if (!keys['Space']) {
      ctx.globalAlpha = 0.3; ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('TAP TO FIRE', W*.79, H-HUD_H-44);
    }
    ctx.restore();
  }

  if (gs.state === 'pause') drawPause();
  if (gs.state === 'over')  drawGameOver();
}

function drawHUD() {
  const y0 = H - HUD_H + 1;
  ctx.fillStyle='#FFD700'; ctx.font='bold 13px Courier New'; ctx.textAlign='left';
  ctx.fillText('SCORE: '+String(gs.score).padStart(7,'0'), 10, y0+14);
  ctx.fillStyle='#886600'; ctx.fillText('HI: '+String(gs.hiScore).padStart(7,'0'), 10, y0+28);
  const fx=195, fy=y0+6, fw=180, fh=10;
  ctx.fillStyle='#333'; ctx.fillRect(fx,fy,fw,fh);
  const fp=gs.fuel/gs.maxFuel;
  ctx.fillStyle=fp>.5?'#00DD00':fp>.25?'#FFAA00':'#FF2200';
  ctx.fillRect(fx,fy,fw*fp,fh);
  ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.strokeRect(fx,fy,fw,fh);
  ctx.fillStyle='#AAA'; ctx.font='10px Courier New'; ctx.textAlign='right';
  ctx.fillText('FUEL', fx-4, fy+9);
  const px=400, py=y0+6, pw=140, ph=10;
  ctx.fillStyle='#113'; ctx.fillRect(px,py,pw,ph);
  ctx.fillStyle='#0066FF'; ctx.fillRect(px,py,pw*(gs.levelProg/gs.levelLen),ph);
  ctx.strokeStyle='#444'; ctx.strokeRect(px,py,pw,ph);
  ctx.fillStyle='#FFD700'; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
  ctx.fillText('LEVEL '+gs.level, px+pw*.5, py+9);
  ctx.fillStyle='#5599FF'; ctx.font='bold 14px Courier New'; ctx.textAlign='right';
  ctx.fillText('SHIPS: '+'▶'.repeat(Math.max(0,gs.lives)), W-10, y0+16);
  ctx.fillStyle='#446644'; ctx.font='11px Courier New';
  ctx.fillText('TOF '+String(gs.score*4).padStart(7,'0'), W-10, y0+28);
}

function drawPause() {
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=20;
  ctx.fillStyle='#FFD700'; ctx.font='bold 42px Courier New'; ctx.fillText('PAUSED', W/2, H/2);
  ctx.shadowBlur=0; ctx.fillStyle='#AAA'; ctx.font='16px Courier New';
  const isTouch = window.matchMedia('(pointer: coarse)').matches;
  ctx.fillText(isTouch ? 'Tap ⏸ to resume' : 'Press P to resume', W/2, H/2+34);
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#FF0000'; ctx.shadowBlur=30;
  ctx.fillStyle='#FF3333'; ctx.font='bold 52px Courier New'; ctx.fillText('GAME OVER', W/2, H/2-50);
  ctx.shadowBlur=0; ctx.fillStyle='#FFD700'; ctx.font='24px Courier New';
  ctx.fillText('SCORE: '+String(gs.score).padStart(7,'0'), W/2, H/2+4);
  ctx.fillStyle='#888'; ctx.font='16px Courier New';
  ctx.fillText('HI-SCORE: '+String(gs.hiScore).padStart(7,'0'), W/2, H/2+32);
  const blink = Math.floor(Date.now()/550)%2===0;
  if (blink) {
    ctx.fillStyle='#00FFFF'; ctx.font='bold 17px Courier New';
    const isTouch = window.matchMedia('(pointer: coarse)').matches;
    ctx.fillText(isTouch ? 'TAP FIRE TO PLAY AGAIN' : 'PRESS ENTER or SPACE TO PLAY AGAIN', W/2, H/2+70);
  }
}

function drawTitle() {
  const t = Date.now()*.0008;
  ctx.fillStyle='#8B6500'; ctx.beginPath(); ctx.moveTo(0,H-10);
  for (let x=0; x<=W; x+=6) {
    ctx.lineTo(x, H-35-Math.abs(Math.sin(x*.028+t)*28+Math.sin(x*.065)*14));
  }
  ctx.lineTo(W,H-10); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=2; ctx.beginPath();
  for (let x=0; x<=W; x+=6) {
    const y=H-35-Math.abs(Math.sin(x*.028+t)*28+Math.sin(x*.065)*14);
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.textAlign='center';
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=40;
  ctx.fillStyle='#FFD700'; ctx.font='bold 80px Courier New'; ctx.fillText('PARSEC', W/2, 120);
  ctx.shadowBlur=0;
  ctx.fillStyle='#00FFFF'; ctx.font='18px Courier New'; ctx.fillText('B R O W S E R   E D I T I O N', W/2, 155);
  ctx.fillStyle='#666'; ctx.font='12px Courier New'; ctx.fillText('Inspired by the classic TI-99/4A game (1982)', W/2, 178);
  const bx=W/2-230, by=210, bw=460, bh=155;
  ctx.fillStyle='rgba(0,20,40,0.7)'; ctx.strokeStyle='#336'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fill(); ctx.stroke();
  const isTouch = window.matchMedia('(pointer: coarse)').matches;
  const lines = isTouch
    ? [['D-PAD (below)','Move ship'],['FIRE (below)','Shoot'],['⏸ (below)','Pause'],['',''],['FLY LOW OVER ◆ FUEL ◆ ZONES TO REFUEL',''],['SHOOT ENEMIES FOR POINTS — SURVIVE!','']]
    : [['ARROWS / WASD','Move ship'],['SPACE or Z','Fire'],['P','Pause'],['',''],['FLY LOW OVER ◆ FUEL ◆ ZONES TO REFUEL',''],['SHOOT ENEMIES FOR POINTS — SURVIVE!','']];
  ctx.font='14px Courier New';
  lines.forEach(([k,v],i) => {
    ctx.textAlign='left'; ctx.fillStyle='#FFD700';
    if (v) ctx.fillText(k, bx+20, by+28+i*22);
    else { ctx.fillStyle='#77BBAA'; ctx.textAlign='center'; ctx.fillText(k, W/2, by+28+i*22); }
    if (v) { ctx.fillStyle='#AAA'; ctx.fillText(v, bx+230, by+28+i*22); }
  });
  const blink = Math.floor(Date.now()/520)%2===0;
  if (blink) {
    ctx.shadowColor='#00FF88'; ctx.shadowBlur=12;
    ctx.fillStyle='#00FF88'; ctx.font='bold 19px Courier New'; ctx.textAlign='center';
    ctx.fillText(isTouch ? '▶  TAP FIRE TO START  ◀' : '▶  PRESS ENTER or SPACE TO START  ◀', W/2, 400);
    ctx.shadowBlur=0;
  }
  const dt = Date.now()*.001;
  drawPlayerShip(80+Math.sin(dt)*10, 55+Math.cos(dt*.7)*8, 38, 18, '#5599FF');
  drawFighter(W-130+Math.sin(dt+1)*12, 50+Math.cos(dt*.8)*10, 34, 16, '#FF5533');
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }

gs = { state: 'title', hiScore: 0 };
initTerrain();
loop();
</script>
</body>
</html>
