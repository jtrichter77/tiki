<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARSEC — Browser Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    user-select: none;
  }
  canvas {
    display: block;
    border: 2px solid #333;
    image-rendering: pixelated;
  }
  #controls {
    color: #555;
    font-size: 12px;
    margin-top: 8px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<canvas id="c" width="800" height="480"></canvas>
<div id="controls">ARROWS / WASD: Move &nbsp;|&nbsp; SPACE or Z: Fire &nbsp;|&nbsp; P: Pause</div>

<script>
"use strict";
// ─────────────────────────────────────────────────────────────────────────────
// PARSEC – Browser Edition
// Inspired by the classic TI-99/4A game by Texas Instruments (1982)
// ─────────────────────────────────────────────────────────────────────────────

const C   = document.getElementById('c');
const ctx = C.getContext('2d');
const W   = C.width;   // 800
const H   = C.height;  // 480
const HUD_H = 32;      // HUD bar at bottom

// ─── Audio Engine ─────────────────────────────────────────────────────────────
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}
function tone(freq, type, dur, vol = 0.25, freqStart = null) {
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type;
    const t = ac.currentTime;
    o.frequency.setValueAtTime(freqStart || freq, t);
    if (freqStart) o.frequency.exponentialRampToValueAtTime(freq, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function noise(dur, vol = 0.4) {
  try {
    const ac = getAC();
    const len = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ac.createBufferSource();
    const g = ac.createGain();
    src.buffer = buf; src.connect(g); g.connect(ac.destination);
    g.gain.value = vol;
    src.start();
  } catch(e) {}
}
function sfxShoot()    { tone(900, 'square', 0.07, 0.12, 1400); }
function sfxExplosion(big) { noise(big ? 0.5 : 0.25, big ? 0.5 : 0.3); tone(80, 'sawtooth', 0.3, 0.15, 200); }
function sfxHit()      { tone(220, 'sawtooth', 0.12, 0.18, 440); }
function sfxRefuel()   { if (Math.random() < 0.25) tone(523 + Math.random() * 200, 'sine', 0.04, 0.08); }
function sfxLevelUp()  {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => tone(f, 'square', 0.12, 0.18), i * 110);
  });
}
function sfxGameOver() { tone(220, 'sawtooth', 0.6, 0.3, 440); }

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  // Pause toggle
  if (e.code === 'KeyP') {
    if (gs && gs.state === 'play')  gs.state = 'pause';
    else if (gs && gs.state === 'pause') gs.state = 'play';
  }
  // Start / restart
  if (['Enter','Space','KeyZ'].includes(e.code)) {
    if (!gs || gs.state === 'title' || gs.state === 'over') {
      getAC().resume().then(startGame);
    }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Helpers ──────────────────────────────────────────────────────────────────
const clamp  = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp   = (a, b, t)   => a + (b - a) * t;
const rnd    = (lo, hi)    => lo + Math.random() * (hi - lo);
const rndInt = (lo, hi)    => Math.floor(rnd(lo, hi + 1));
const rectHit = (a, b)     =>
  a.x < b.x + b.w && a.x + a.w > b.x &&
  a.y < b.y + b.h && a.y + a.h > b.y;

// ─── Stars ────────────────────────────────────────────────────────────────────
const STAR_LAYERS = [
  // { stars[], speed, size }
  { stars: [], speed: 0.3, sz: 0.8 },
  { stars: [], speed: 0.7, sz: 1.2 },
  { stars: [], speed: 1.4, sz: 1.8 },
];
(function initStars() {
  STAR_LAYERS.forEach(layer => {
    for (let i = 0; i < 60; i++) {
      layer.stars.push({ x: Math.random() * W, y: Math.random() * (H - HUD_H) });
    }
  });
})();
function updateStars() {
  STAR_LAYERS.forEach(layer => {
    layer.stars.forEach(s => {
      s.x -= layer.speed;
      if (s.x < 0) { s.x = W; s.y = Math.random() * (H - HUD_H); }
    });
  });
}
function drawStars() {
  STAR_LAYERS.forEach((layer, li) => {
    const alpha = 0.4 + li * 0.2;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    layer.stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, layer.sz, 0, Math.PI * 2);
      ctx.fill();
    });
  });
}

// ─── Terrain ─────────────────────────────────────────────────────────────────
const SEG_W = 14;   // terrain segment width in pixels
const SEGS  = Math.ceil(W / SEG_W) + 6;
let tPts  = [];     // {x, y, fuel}
let inFuelZone    = false;
let fuelZoneLeft  = 0;
let fuelZoneCd    = 0;

function initTerrain() {
  tPts = [];
  inFuelZone   = false;
  fuelZoneLeft = 0;
  fuelZoneCd   = 220;
  let y = H - 100;
  for (let i = 0; i < SEGS + 4; i++) {
    tPts.push({ x: i * SEG_W, y, fuel: false });
    y = clamp(y + rnd(-22, 22), H - 210, H - 48);
  }
}

function terrainYAt(px) {
  for (let i = 0; i < tPts.length - 1; i++) {
    if (tPts[i].x <= px && tPts[i+1].x > px) {
      const t = (px - tPts[i].x) / (tPts[i+1].x - tPts[i].x);
      return lerp(tPts[i].y, tPts[i+1].y, t);
    }
  }
  return H - 60;
}

function playerOverFuelZone() {
  const p = gs.player;
  const mid = p.x + p.w / 2;
  for (let i = 0; i < tPts.length - 1; i++) {
    if (tPts[i].x <= mid && tPts[i+1].x > mid) return tPts[i].fuel;
  }
  return false;
}

function advanceTerrain(spd) {
  for (const pt of tPts) pt.x -= spd;
  // drop off-screen left
  while (tPts.length && tPts[0].x < -SEG_W * 2) tPts.shift();
  // grow on right
  while (tPts.length < SEGS + 4) {
    const prev = tPts[tPts.length - 1];
    fuelZoneCd--;
    let fuel = false;
    if (fuelZoneCd <= 0 && !inFuelZone) {
      inFuelZone   = true;
      fuelZoneLeft = 16;
      fuelZoneCd   = 320 + rndInt(0, 200);
      addMsg('FUEL STATION AHEAD!', W/2 - 10, H/2 - 60, '#00FFFF');
    }
    let newY;
    if (inFuelZone && fuelZoneLeft > 0) {
      fuel = true;
      newY = H - 68;
      fuelZoneLeft--;
      if (fuelZoneLeft === 0) inFuelZone = false;
    } else {
      newY = clamp(prev.y + rnd(-22, 22), H - 210, H - 48);
    }
    tPts.push({ x: prev.x + SEG_W, y: newY, fuel });
  }
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnExplosion(x, y, big) {
  const n = big ? 36 : 16;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = rnd(0.5, big ? 4.5 : 2.5);
    gs.particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: rndInt(18, big ? 55 : 38),
      col: ['#FFD700','#FF8C00','#FF4500','#FFFFFF','#FF6644'][rndInt(0,4)],
      sz: rnd(1.5, big ? 5 : 3.5),
    });
  }
}

// ─── Screen Messages ─────────────────────────────────────────────────────────
function addMsg(text, x, y, col = '#FFD700') {
  gs.msgs.push({ text, x, y, life: 90, col });
}

// ─── Enemy Shapes ─────────────────────────────────────────────────────────────
// Player ship (faces right)
function drawPlayerShip(x, y, w, h, col) {
  ctx.save();
  ctx.translate(x + w*0.5, y + h*0.5);
  // fuselage
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo( w*0.5,  0);
  ctx.lineTo(-w*0.3, -h*0.35);
  ctx.lineTo(-w*0.5,  0);
  ctx.lineTo(-w*0.3,  h*0.35);
  ctx.closePath();
  ctx.fill();
  // upper wing
  ctx.fillStyle = '#3399FF';
  ctx.beginPath();
  ctx.moveTo( w*0.05,  0);
  ctx.lineTo(-w*0.3,  -h*0.35);
  ctx.lineTo(-w*0.1,  -h*0.75);
  ctx.lineTo( w*0.1,  -h*0.2);
  ctx.closePath();
  ctx.fill();
  // lower wing
  ctx.beginPath();
  ctx.moveTo( w*0.05,  0);
  ctx.lineTo(-w*0.3,   h*0.35);
  ctx.lineTo(-w*0.1,   h*0.75);
  ctx.lineTo( w*0.1,   h*0.2);
  ctx.closePath();
  ctx.fill();
  // cockpit
  ctx.fillStyle = '#00FFFF';
  ctx.beginPath();
  ctx.arc(w*0.15, 0, h*0.22, 0, Math.PI*2);
  ctx.fill();
  // engine glow
  ctx.fillStyle = '#FF6600';
  ctx.beginPath();
  ctx.arc(-w*0.45, 0, h*0.12, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// Fighter enemy (faces left)
function drawFighter(x, y, w, h, col) {
  ctx.save();
  ctx.translate(x + w*0.5, y + h*0.5);
  ctx.scale(-1, 1);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo( w*0.5,  0);
  ctx.lineTo(-w*0.3, -h*0.35);
  ctx.lineTo(-w*0.5,  0);
  ctx.lineTo(-w*0.3,  h*0.35);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#FF4400';
  ctx.beginPath();
  ctx.moveTo( w*0.05,  0);
  ctx.lineTo(-w*0.3,  -h*0.35);
  ctx.lineTo(-w*0.1,  -h*0.7);
  ctx.lineTo( w*0.1,  -h*0.18);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo( w*0.05,  0);
  ctx.lineTo(-w*0.3,   h*0.35);
  ctx.lineTo(-w*0.1,   h*0.7);
  ctx.lineTo( w*0.1,   h*0.18);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#FF8800';
  ctx.beginPath();
  ctx.arc(w*0.15, 0, h*0.22, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// Swooper (creature / bird shape)
function drawSwooper(x, y, w, h) {
  ctx.save();
  ctx.translate(x + w*0.5, y + h*0.5);
  ctx.fillStyle = '#44FF66';
  // body
  ctx.beginPath();
  ctx.ellipse(0, 0, w*0.22, h*0.3, 0, 0, Math.PI*2);
  ctx.fill();
  // left wing
  ctx.beginPath();
  ctx.moveTo(-w*0.05, -h*0.1);
  ctx.lineTo(-w*0.5,  -h*0.7);
  ctx.lineTo(-w*0.18,  h*0.2);
  ctx.closePath();
  ctx.fillStyle = '#22CC44';
  ctx.fill();
  // right wing
  ctx.beginPath();
  ctx.moveTo( w*0.05, -h*0.1);
  ctx.lineTo( w*0.5,  -h*0.7);
  ctx.lineTo( w*0.18,  h*0.2);
  ctx.closePath();
  ctx.fill();
  // tail
  ctx.beginPath();
  ctx.moveTo(-w*0.1, h*0.25);
  ctx.lineTo( w*0.1, h*0.25);
  ctx.lineTo( 0,     h*0.6);
  ctx.closePath();
  ctx.fillStyle = '#44FF66';
  ctx.fill();
  // eye
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.arc(0, -h*0.05, h*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// Bomber (large, slow)
function drawBomber(x, y, w, h, hp) {
  ctx.save();
  ctx.translate(x + w*0.5, y + h*0.5);
  ctx.scale(-1, 1);
  // main hull
  ctx.fillStyle = '#CC3300';
  ctx.beginPath();
  ctx.moveTo( w*0.5,  0);
  ctx.lineTo(-w*0.1, -h*0.45);
  ctx.lineTo(-w*0.5, -h*0.3);
  ctx.lineTo(-w*0.5,  h*0.3);
  ctx.lineTo(-w*0.1,  h*0.45);
  ctx.closePath();
  ctx.fill();
  // top fin
  ctx.fillStyle = '#882200';
  ctx.beginPath();
  ctx.moveTo(-w*0.1, -h*0.45);
  ctx.lineTo( w*0.0, -h*0.9);
  ctx.lineTo( w*0.2, -h*0.45);
  ctx.closePath();
  ctx.fill();
  // bottom fin
  ctx.beginPath();
  ctx.moveTo(-w*0.1,  h*0.45);
  ctx.lineTo( w*0.0,  h*0.9);
  ctx.lineTo( w*0.2,  h*0.45);
  ctx.closePath();
  ctx.fill();
  // cockpit dome
  ctx.fillStyle = '#FF6600';
  ctx.beginPath();
  ctx.arc(w*0.3, 0, h*0.3, 0, Math.PI*2);
  ctx.fill();
  // HP bar
  if (hp > 1) {
    ctx.fillStyle = '#550000';
    ctx.fillRect(-w*0.5, -h*0.5 - 8, w, 6);
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(-w*0.5, -h*0.5 - 8, w * (hp / 3), 6);
  }
  ctx.restore();
}

// Ground turret
function drawTurret(x, y, w, h, angle) {
  ctx.save();
  ctx.translate(x + w*0.5, y + h*0.5);
  ctx.fillStyle = '#886600';
  ctx.fillRect(-w*0.5, 0, w, h*0.5);
  ctx.fillStyle = '#AAAA00';
  ctx.beginPath();
  ctx.arc(0, 0, h*0.42, 0, Math.PI*2);
  ctx.fill();
  // barrel
  ctx.strokeStyle = '#FFEE00';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(angle) * h*0.55, Math.sin(angle) * h*0.55);
  ctx.stroke();
  ctx.restore();
}

// ─── Spawners ─────────────────────────────────────────────────────────────────
function spawnEnemy() {
  const lv = gs.level;
  const roll = Math.random();
  const fPct = roll < 0.45 ? 0 : roll < 0.72 ? 1 : roll < 0.87 ? 2 : 3;
  const types = ['fighter', 'swooper', 'bomber', 'turret'];
  const type = types[fPct];

  // Weighted by level: early levels fewer bombers/turrets
  const useBomber = type === 'bomber' && lv < 2;
  const useTurret = type === 'turret' && lv < 3;
  const finalType = (useBomber || useTurret) ? 'fighter' : type;

  const base = { active: true, type: finalType };

  switch (finalType) {
    case 'fighter': return {
      ...base,
      x: W + 20, y: rnd(50, H - HUD_H - 220),
      w: 34, h: 16,
      vx: -(gs.scrollSpd + 1.2 + lv * 0.18),
      vy: 0,
      hp: 1, pts: 100,
      phase: 0, amp: rnd(0, 40), freq: rnd(0.025, 0.055),
      shootCd: rndInt(80, 140),
    };
    case 'swooper': return {
      ...base,
      x: W + 20, y: rnd(30, 120),
      w: 32, h: 24,
      vx: -(gs.scrollSpd + 2.2),
      vy: 0,
      hp: 1, pts: 180,
      t: 0, baseY: rnd(30, 120), amp: rnd(70, 130),
      shootCd: rndInt(100, 180),
    };
    case 'bomber': return {
      ...base,
      x: W + 20, y: rnd(70, H - HUD_H - 240),
      w: 52, h: 26,
      vx: -(gs.scrollSpd * 0.65),
      vy: 0,
      hp: 3, pts: 400,
      shootCd: rndInt(35, 60),
    };
    case 'turret': return {
      ...base,
      x: W + 20, y: 0,   // y set after terrain lookup
      w: 28, h: 22,
      vx: -gs.scrollSpd,
      vy: 0,
      hp: 2, pts: 250,
      angle: -Math.PI * 0.75,
      targetAngle: -Math.PI * 0.75,
      shootCd: rndInt(60, 90),
      grounded: true,
    };
  }
}

// ─── Game State ───────────────────────────────────────────────────────────────
let gs = null;

function startGame() {
  gs = {
    state: 'play',
    score: 0,
    hiScore: (gs && gs.hiScore) || 0,
    lives: 3,
    level: 1,
    fuel: 100,
    maxFuel: 100,
    fuelDrain: 0.018,
    scrollSpd: 2.5,
    levelProg: 0,
    levelLen: 2400,
    enemyTimer: 0,
    enemyInterval: 110,
    refueling: false,
    player: {
      x: 110, y: H/2 - 20,
      vx: 0, vy: 0,
      w: 38, h: 18,
      shootCd: 0,
      invincible: 0,
    },
    bullets:      [],
    eBullets:     [],
    enemies:      [],
    particles:    [],
    msgs:         [],
  };
  initTerrain();
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  if (!gs || gs.state !== 'play') return;

  const p     = gs.player;
  const speed = 4.8;

  // ── Player movement ──
  if (keys['ArrowLeft']  || keys['KeyA']) p.vx = -speed;
  else if (keys['ArrowRight'] || keys['KeyD']) p.vx =  speed;
  else p.vx *= 0.78;

  if (keys['ArrowUp']   || keys['KeyW']) p.vy = -speed;
  else if (keys['ArrowDown']  || keys['KeyS']) p.vy =  speed;
  else p.vy *= 0.78;

  p.x = clamp(p.x + p.vx, 8, W * 0.58 - p.w);
  p.y = clamp(p.y + p.vy, 8, H - HUD_H - p.h - 2);

  // ── Shooting ──
  if (p.shootCd > 0) p.shootCd--;
  if ((keys['Space'] || keys['KeyZ']) && p.shootCd === 0) {
    gs.bullets.push({ x: p.x + p.w, y: p.y + p.h/2 - 2, w: 14, h: 5, vx: 11, vy: 0 });
    p.shootCd = 11;
    sfxShoot();
  }

  // ── Terrain collision & refueling ──
  const terrY = terrainYAt(p.x + p.w * 0.5);
  if (p.y + p.h >= terrY - 1) {
    if (playerOverFuelZone()) {
      // Refueling!
      gs.refueling = true;
      if (gs.fuel < gs.maxFuel) {
        gs.fuel = Math.min(gs.maxFuel, gs.fuel + 1.1);
        sfxRefuel();
        if (gs.fuel >= gs.maxFuel) addMsg('TANK FULL!', p.x + 20, p.y - 20, '#00FF00');
      }
      p.y = terrY - p.h - 1;
    } else if (!p.invincible) {
      killPlayer(); return;
    }
  } else {
    gs.refueling = false;
  }

  // ── Fuel drain ──
  gs.fuel -= gs.fuelDrain;
  if (gs.fuel <= 0) { gs.fuel = 0; killPlayer(); return; }
  if (gs.fuel < 20 && Math.floor(Date.now() / 500) % 2 === 0 && !gs._fuelWarn) {
    gs._fuelWarn = true;
    addMsg('LOW FUEL!', p.x, p.y - 24, '#FF4400');
  }
  if (gs.fuel >= 20) gs._fuelWarn = false;

  // ── Invincibility timer ──
  if (p.invincible > 0) p.invincible--;

  // ── Scroll terrain ──
  advanceTerrain(gs.scrollSpd);

  // ── Player bullets ──
  gs.bullets = gs.bullets.filter(b => { b.x += b.vx; return b.x < W + 20; });

  // ── Enemy bullets ──
  gs.eBullets = gs.eBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H;
  });

  // ── Enemy spawning ──
  gs.enemyTimer++;
  if (gs.enemyTimer >= gs.enemyInterval) {
    gs.enemyTimer = 0;
    const e = spawnEnemy();
    if (e.type === 'turret') {
      // Place turret on top of terrain at its x spawn
      e.y = terrainYAt(e.x) - e.h;
    }
    // Sometimes spawn a formation
    if (Math.random() < 0.25 && e.type === 'fighter') {
      const n = rndInt(2, 3);
      for (let i = 0; i < n; i++) {
        const fe = spawnEnemy();
        fe.type = 'fighter';
        fe.x = W + 20 + i * 55;
        fe.y = rnd(50, H - HUD_H - 220);
        gs.enemies.push(fe);
      }
    } else {
      gs.enemies.push(e);
    }
    gs.enemyInterval = Math.max(38, 110 - gs.level * 7);
  }

  // ── Update enemies ──
  for (const e of gs.enemies) {
    if (!e.active) continue;
    e.x += e.vx;

    if (e.type === 'fighter') {
      e.phase += e.freq;
      e.y += Math.sin(e.phase) * e.amp * 0.012;
      e.y = clamp(e.y, 30, H - HUD_H - 200);
    } else if (e.type === 'swooper') {
      e.t += 0.055;
      e.y = e.baseY + Math.sin(e.t) * e.amp;
      e.y = clamp(e.y, 20, H - HUD_H - 180);
    } else if (e.type === 'turret') {
      // snap to terrain
      const ty = terrainYAt(e.x + e.w * 0.5);
      e.y = ty - e.h;
      // aim at player
      const dx = p.x - e.x, dy = p.y - e.y;
      e.targetAngle = Math.atan2(dy, dx);
      e.angle = lerp(e.angle, e.targetAngle, 0.04);
    }

    // Shooting
    e.shootCd--;
    if (e.shootCd <= 0) {
      e.shootCd = rndInt(50, 100);
      const dx = p.x - e.x, dy = p.y - e.y;
      const d  = Math.hypot(dx, dy);
      if (d < 500 && e.type !== 'turret') {
        const spd = 3.5 + gs.level * 0.15;
        gs.eBullets.push({
          x: e.x, y: e.y + e.h * 0.5,
          w: 9, h: 4,
          vx: -spd * 0.8 + (dx / d) * spd * 0.4,
          vy: (dy / d) * spd * 0.55,
        });
      }
      if (e.type === 'turret') {
        const spd = 4.5;
        const a = e.angle;
        gs.eBullets.push({
          x: e.x + e.w*0.5 + Math.cos(a) * e.h*0.55,
          y: e.y + e.h*0.5 + Math.sin(a) * e.h*0.55,
          w: 9, h: 4,
          vx: Math.cos(a) * spd,
          vy: Math.sin(a) * spd,
        });
      }
    }

    // Off-screen left → remove
    if (e.x + e.w < -40) { e.active = false; continue; }

    // Player bullets hit enemy
    for (const b of gs.bullets) {
      if (b.vx > 0 && rectHit(b, e)) {
        b.x = -9999;
        e.hp--;
        if (e.hp <= 0) {
          e.active = false;
          spawnExplosion(e.x + e.w*0.5, e.y + e.h*0.5, e.type === 'bomber');
          sfxExplosion(e.type === 'bomber');
          gs.score += e.pts;
          addMsg('+' + e.pts, e.x + e.w*0.5, e.y - 8);
        } else {
          sfxHit();
        }
        break;
      }
    }
    if (!e.active) continue;

    // Enemy collides with player
    if (!p.invincible && rectHit(p, e)) { killPlayer(); return; }
  }
  gs.enemies = gs.enemies.filter(e => e.active);

  // ── Enemy bullets hit player ──
  if (!p.invincible) {
    for (const b of gs.eBullets) {
      if (rectHit(p, b)) { b.x = -9999; killPlayer(); return; }
    }
  }

  // ── Particles ──
  for (const pt of gs.particles) {
    pt.x += pt.vx; pt.y += pt.vy;
    pt.vy += 0.06;
    pt.life--;
  }
  gs.particles = gs.particles.filter(pt => pt.life > 0);

  // ── Messages ──
  for (const m of gs.msgs) { m.y -= 0.5; m.life--; }
  gs.msgs = gs.msgs.filter(m => m.life > 0);

  // ── Update stars ──
  updateStars();

  // ── Level progression ──
  gs.levelProg += gs.scrollSpd;
  if (gs.levelProg >= gs.levelLen) {
    gs.levelProg = 0;
    gs.level++;
    gs.scrollSpd  = Math.min(6.5, 2.5 + gs.level * 0.28);
    gs.fuelDrain  = Math.min(0.055, 0.018 + gs.level * 0.004);
    sfxLevelUp();
    addMsg('LEVEL ' + gs.level, W/2, H/2 - 30, '#FFD700');
  }
}

function killPlayer() {
  const p = gs.player;
  spawnExplosion(p.x + p.w*0.5, p.y + p.h*0.5, true);
  sfxExplosion(true);
  gs.lives--;
  if (gs.lives <= 0) {
    gs.hiScore = Math.max(gs.hiScore, gs.score);
    gs.state = 'over';
    sfxGameOver();
    return;
  }
  p.x = 110; p.y = H/2 - 20;
  p.vx = 0; p.vy = 0;
  p.invincible = 200;
  gs.fuel = gs.maxFuel;
  gs.eBullets = [];
  addMsg('SHIP LOST!', W/2, H/2 - 20, '#FF4444');
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  // Space background
  ctx.fillStyle = '#00000E';
  ctx.fillRect(0, 0, W, H - HUD_H);

  // HUD background
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, H - HUD_H, W, HUD_H);

  // Stars (behind everything)
  drawStars();

  // ── Title screen ──
  if (!gs || gs.state === 'title') { drawTitle(); return; }

  // ── Terrain ──
  if (tPts.length > 1) {
    // Fill
    ctx.beginPath();
    ctx.moveTo(0, H - HUD_H);
    ctx.lineTo(tPts[0].x, tPts[0].y);
    for (let i = 1; i < tPts.length; i++) ctx.lineTo(tPts[i].x, tPts[i].y);
    ctx.lineTo(W, H - HUD_H);
    ctx.closePath();
    const grd = ctx.createLinearGradient(0, H - 240, 0, H - HUD_H);
    grd.addColorStop(0, '#CC9900');
    grd.addColorStop(0.4, '#AA7700');
    grd.addColorStop(1, '#774400');
    ctx.fillStyle = grd;
    ctx.fill();
    // Edge glow
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(tPts[0].x, tPts[0].y);
    for (let i = 1; i < tPts.length; i++) ctx.lineTo(tPts[i].x, tPts[i].y);
    ctx.stroke();

    // Fuel zone markers
    let inFZ = false;
    let fzStart = 0;
    for (let i = 0; i < tPts.length; i++) {
      if (tPts[i].fuel && !inFZ) { inFZ = true; fzStart = tPts[i].x; }
      if (!tPts[i].fuel && inFZ) {
        inFZ = false;
        const midX = (fzStart + tPts[i].x) * 0.5;
        const ty   = terrainYAt(midX);
        ctx.save();
        ctx.fillStyle = '#00FFFF';
        ctx.shadowColor = '#00FFFF';
        ctx.shadowBlur = 6;
        ctx.font = 'bold 11px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('◆ FUEL ◆', midX, ty - 8);
        ctx.restore();
        // Tint the flat section
        ctx.fillStyle = 'rgba(0,200,200,0.08)';
        ctx.fillRect(fzStart, ty - 4, tPts[i].x - fzStart, H - HUD_H - ty + 4);
      }
    }
  }

  // ── Enemies ──
  for (const e of gs.enemies) {
    if (!e.active) continue;
    switch (e.type) {
      case 'fighter': drawFighter(e.x, e.y, e.w, e.h, '#FF5533'); break;
      case 'swooper': drawSwooper(e.x, e.y, e.w, e.h);             break;
      case 'bomber':  drawBomber(e.x, e.y, e.w, e.h, e.hp);       break;
      case 'turret':  drawTurret(e.x, e.y, e.w, e.h, e.angle);    break;
    }
  }

  // ── Player ──
  const p = gs.player;
  const blink = p.invincible > 0 && Math.floor(p.invincible / 6) % 2 === 0;
  if (!blink) {
    drawPlayerShip(p.x, p.y, p.w, p.h, '#5599FF');
    // Thruster flame
    const flameLen = rnd(6, 14);
    const grad = ctx.createLinearGradient(p.x - 2, p.y + p.h*0.5, p.x - 2 - flameLen, p.y + p.h*0.5);
    grad.addColorStop(0, '#FF8800');
    grad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(p.x - 4, p.y + p.h*0.5, flameLen, 4, 0, 0, Math.PI*2);
    ctx.fill();
  }
  if (gs.refueling) {
    ctx.save();
    ctx.fillStyle = '#00FF88';
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('REFUELING', p.x + p.w*0.5, p.y - 8);
    ctx.restore();
  }

  // ── Bullets ──
  for (const b of gs.bullets) {
    const gr = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 5);
    gr.addColorStop(0, '#FFFFFF');
    gr.addColorStop(0.4, '#FFE000');
    gr.addColorStop(1, 'rgba(255,180,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.ellipse(b.x, b.y + b.h*0.5, 6, 3, 0, 0, Math.PI*2);
    ctx.fill();
  }
  for (const b of gs.eBullets) {
    const gr = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 5);
    gr.addColorStop(0, '#FFFFFF');
    gr.addColorStop(0.4, '#FF6600');
    gr.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.ellipse(b.x, b.y + b.h*0.5, 5, 3, 0.3, 0, Math.PI*2);
    ctx.fill();
  }

  // ── Particles ──
  for (const pt of gs.particles) {
    ctx.globalAlpha = clamp(pt.life / 30, 0, 1);
    ctx.fillStyle = pt.col;
    ctx.fillRect(pt.x - pt.sz*0.5, pt.y - pt.sz*0.5, pt.sz, pt.sz);
  }
  ctx.globalAlpha = 1;

  // ── Screen messages ──
  for (const m of gs.msgs) {
    ctx.save();
    ctx.globalAlpha = clamp(m.life / 40, 0, 1);
    ctx.fillStyle = m.col;
    ctx.shadowColor = m.col;
    ctx.shadowBlur = 10;
    ctx.font = 'bold 15px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(m.text, m.x, m.y);
    ctx.restore();
  }

  // ── HUD ──
  drawHUD();

  // ── Overlays ──
  if (gs.state === 'pause') drawPause();
  if (gs.state === 'over')  drawGameOver();
}

function drawHUD() {
  const y0 = H - HUD_H + 1;

  // Score
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + String(gs.score).padStart(7,'0'), 10, y0 + 14);

  // Hi-score
  ctx.fillStyle = '#886600';
  ctx.fillText('HI: ' + String(gs.hiScore).padStart(7,'0'), 10, y0 + 28);

  // Fuel bar
  const fuelBarX = 195, fuelBarY = y0 + 6, fuelBarW = 180, fuelBarH = 10;
  ctx.fillStyle = '#333';
  ctx.fillRect(fuelBarX, fuelBarY, fuelBarW, fuelBarH);
  const fpct = gs.fuel / gs.maxFuel;
  ctx.fillStyle = fpct > 0.5 ? '#00DD00' : fpct > 0.25 ? '#FFAA00' : '#FF2200';
  ctx.fillRect(fuelBarX, fuelBarY, fuelBarW * fpct, fuelBarH);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(fuelBarX, fuelBarY, fuelBarW, fuelBarH);
  ctx.fillStyle = '#AAA';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('FUEL', fuelBarX - 4, fuelBarY + 9);

  // Level progress bar
  const pgX = 400, pgY = y0 + 6, pgW = 140, pgH = 10;
  ctx.fillStyle = '#113';
  ctx.fillRect(pgX, pgY, pgW, pgH);
  ctx.fillStyle = '#0066FF';
  ctx.fillRect(pgX, pgY, pgW * (gs.levelProg / gs.levelLen), pgH);
  ctx.strokeStyle = '#444';
  ctx.strokeRect(pgX, pgY, pgW, pgH);
  ctx.fillStyle = '#AAA';
  ctx.textAlign = 'left';
  ctx.fillText('LVL ' + gs.level, pgX, pgY + 9 + 11);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + gs.level, pgX + pgW * 0.5, pgY + 9);

  // Lives
  ctx.fillStyle = '#5599FF';
  ctx.font = 'bold 14px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('SHIPS: ' + '▶'.repeat(Math.max(0, gs.lives)), W - 10, y0 + 16);

  // TOF (time-on-flight / score alias, a nod to original)
  ctx.fillStyle = '#446644';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('TOF ' + String(gs.score * 4).padStart(7,'0'), W - 10, y0 + 28);
}

function drawPause() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 42px Courier New';
  ctx.fillText('PAUSED', W/2, H/2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#AAA';
  ctx.font = '16px Courier New';
  ctx.fillText('Press P to resume', W/2, H/2 + 34);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.shadowColor = '#FF0000'; ctx.shadowBlur = 30;
  ctx.fillStyle = '#FF3333';
  ctx.font = 'bold 52px Courier New';
  ctx.fillText('GAME OVER', W/2, H/2 - 50);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#FFD700';
  ctx.font = '24px Courier New';
  ctx.fillText('SCORE: ' + String(gs.score).padStart(7,'0'), W/2, H/2 + 4);

  ctx.fillStyle = '#888';
  ctx.font = '16px Courier New';
  ctx.fillText('HI-SCORE: ' + String(gs.hiScore).padStart(7,'0'), W/2, H/2 + 32);

  const blink = Math.floor(Date.now() / 550) % 2 === 0;
  if (blink) {
    ctx.fillStyle = '#00FFFF';
    ctx.font = 'bold 17px Courier New';
    ctx.fillText('PRESS ENTER or SPACE TO PLAY AGAIN', W/2, H/2 + 70);
  }
}

function drawTitle() {
  // Animated terrain silhouette at bottom
  ctx.fillStyle = '#8B6500';
  ctx.beginPath();
  ctx.moveTo(0, H - 10);
  const t = Date.now() * 0.0008;
  for (let x = 0; x <= W; x += 6) {
    const y = H - 35 - Math.abs(Math.sin(x * 0.028 + t) * 28 + Math.sin(x * 0.065) * 14);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H - 10);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 6) {
    const y = H - 35 - Math.abs(Math.sin(x * 0.028 + t) * 28 + Math.sin(x * 0.065) * 14);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.textAlign = 'center';

  // Title glow
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 40;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 80px Courier New';
  ctx.fillText('PARSEC', W/2, 120);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#00FFFF';
  ctx.font = '18px Courier New';
  ctx.fillText('B R O W S E R   E D I T I O N', W/2, 155);

  ctx.fillStyle = '#666';
  ctx.font = '12px Courier New';
  ctx.fillText('Inspired by the classic TI-99/4A game (1982)', W/2, 178);

  // Instructions box
  const bx = W/2 - 230, by = 210, bw = 460, bh = 170;
  ctx.fillStyle = 'rgba(0,20,40,0.7)';
  ctx.strokeStyle = '#336';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 8);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#AAA';
  ctx.font = '14px Courier New';
  const lines = [
    ['ARROWS / WASD', 'Move ship'],
    ['SPACE or Z',    'Fire weapon'],
    ['P',             'Pause'],
    ['', ''],
    ['FLY LOW OVER ◆ FUEL ◆ ZONES TO REFUEL', ''],
    ['SHOOT ENEMIES FOR POINTS — SURVIVE!', ''],
  ];
  lines.forEach(([k, v], i) => {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFD700';
    if (v) ctx.fillText(k, bx + 20, by + 28 + i * 22);
    else { ctx.fillStyle = '#77BBAA'; ctx.textAlign = 'center'; ctx.fillText(k, W/2, by + 28 + i * 22); }
    if (v) { ctx.fillStyle = '#AAA'; ctx.fillText(v, bx + 210, by + 28 + i * 22); }
  });

  // Blinking start prompt
  const blink = Math.floor(Date.now() / 520) % 2 === 0;
  if (blink) {
    ctx.shadowColor = '#00FF88'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#00FF88';
    ctx.font = 'bold 19px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('▶  PRESS ENTER or SPACE TO START  ◀', W/2, 415);
    ctx.shadowBlur = 0;
  }

  // Small demo ships
  const dt = Date.now() * 0.001;
  drawPlayerShip(80 + Math.sin(dt) * 10, 60 + Math.cos(dt * 0.7) * 8, 38, 18, '#5599FF');
  drawFighter(W - 130 + Math.sin(dt + 1) * 12, 55 + Math.cos(dt * 0.8) * 10, 34, 16, '#FF5533');
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Initialize stars and show title
gs = { state: 'title', hiScore: 0 };
initTerrain();
loop();
</script>
